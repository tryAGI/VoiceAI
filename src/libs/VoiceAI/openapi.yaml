  "info": {
    "title": "Voice AI Developer API",
    "description": "Generate realistic speech and clone voices. AI voice agents with retrieval augmented generation (RAG) and model context protocol (MCP) included.",
    "version": "1.4.0",
    "contact": {}
  },
  "servers": [
    {
      "url": "https://api.voice.ai"
    }
  ],
  "components": {
    "schemas": {
      "ValidationError": {
        "properties": {
          "loc": {
            "items": { "type": "string" },
            "type": "array",
            "title": "Location"
          },
          "msg": { "type": "string", "title": "Message" },
          "type": { "type": "string", "title": "Error Type" }
        },
        "type": "object",
        "required": ["loc", "msg", "type"],
        "title": "ValidationError"
      },
      "TextToSpeechGenerateRequest": {
        "type": "object",
        "properties": {
          "text": {
            "type": "string",
            "description": "The text you would like to generate speech for"
          },
          "voice": {
            "type": "string",
            "description": "The voice ID to use for generation"
          },
          "audio_format": {
            "type": "string",
            "description": "The desired audio format: mp3, wav, or pcm"
          },
          "streaming": {
            "type": "boolean",
            "description": "Whether or not to return streaming audio or a complete file"
          },
          "temperature": {
            "type": "number",
            "description": "Model temperature, supported ranges are between 0.8 and 1.2"
          },
          "top_p": {
            "type": "number",
            "description": "Model top_p, supported ranges are between 0.4 and 0.9"
          }
        },
        "required": ["text", "voice", "audio_format", "streaming"]
      },
      "VoiceUploadRequest": {
        "type": "object",
        "properties": {
          "name": { "type": "string", "description": "The name of the voice" },
          "description": {
            "type": "string",
            "description": "A description of the voice"
          },
          "type": {
            "type": "string",
            "description": "Whether the voice is public or private"
          },
          "voiceTags": {
            "description": "Relevant tags for the voice e.g. Male, Female, Calm, Funny",
            "type": "array",
            "items": { "type": "string" }
          },
          "audio": {
            "type": "string",
            "description": "A base64 encoded audio sample"
          }
        },
        "required": ["name", "type", "audio"]
      },
      "VoiceUpdateRequest": {
        "type": "object",
        "properties": {
          "name": { "type": "string", "description": "The name of the voice" },
          "description": {
            "type": "string",
            "description": "A description of the voice"
          },
          "type": {
            "type": "string",
            "description": "Whether the voice is public or private"
          }
        },
        "required": ["name"]
      },
      "VoiceUploadCreateResponse": {
        "type": "object",
        "properties": {
          "voiceId": {
            "type": "string",
            "description": "The ID of the uploaded voice"
          }
        },
        "required": ["voiceId"]
      },
      "VoiceUploadListResponse": {
        "type": "array",
        "items": {
          "type": "object",
          "properties": {
            "id": {
              "type": "string",
              "description": "The ID of the voice"
            },
            "name": {
              "type": "string",
              "description": "The name of the voice"
            },
            "description": {
              "type": "string",
              "description": "The voice description"
            },
            "status": {
              "type": "string",
              "description": "The current status of the voice"
            },
            "isAgentSearchable": {
              "type": "boolean",
              "description": "Whether your voice can be used for Agents"
            },
            "tags": {
              "type": "array",
              "items": { "type": "string" },
              "description": "Tags applied to this voice"
            }
          }
        }
      },
      "VoiceDeleteRequest": {
        "type": "object",
        "properties": {
          "id": {
            "type": "string",
            "description": "The ID of the voice to be deleted"
          }
        },
        "required": ["id"]
      },
      "APIKeyResponse": {
        "properties": {
          "id": { "type": "integer", "title": "Id" },
          "name": { "type": "string", "title": "Name" },
          "description": {
            "type": "string",
            "title": "Description",
            "nullable": true
          },
          "is_active": { "type": "boolean", "title": "Is Active" },
          "created_at": {
            "type": "string",
            "format": "date-time",
            "title": "Created At"
          },
          "last_used_at": {
            "type": "string",
            "format": "date-time",
            "title": "Last Used At",
            "nullable": true
          },
          "expires_at": {
            "type": "string",
            "format": "date-time",
            "title": "Expires At",
            "nullable": true
          }
        },
        "type": "object",
        "required": ["id", "name", "is_active", "created_at"],
        "title": "APIKeyResponse"
      },
      "Agent-Input": {
        "properties": {
          "agent_id": { "type": "string", "title": "Agent Id" },
          "user_id": { "type": "string", "title": "User Id" },
          "name": { "type": "string", "title": "Name" },
          "config": {
            "$ref": "#/components/schemas/PublicAgentConfig",
            "title": "Config"
          },
          "status": {
            "type": "string",
            "title": "Status",
            "default": "paused"
          },
          "status_code": {
            "type": "integer",
            "title": "Status Code",
            "default": 1
          },
          "kb_id": {
            "type": "integer",
            "title": "Kb Id",
            "nullable": true
          },
          "created_at": {
            "type": "string",
            "format": "date-time",
            "title": "Created At"
          },
          "updated_at": {
            "type": "string",
            "format": "date-time",
            "title": "Updated At"
          }
        },
        "type": "object",
        "required": [
          "agent_id",
          "user_id",
          "name",
          "config",
          "created_at",
          "updated_at"
        ],
        "title": "Agent"
      },
      "Agent-Output": {
        "properties": {
          "agent_id": { "type": "string", "title": "Agent Id" },
          "user_id": { "type": "string", "title": "User Id" },
          "name": { "type": "string", "title": "Name" },
          "config": {
            "$ref": "#/components/schemas/PublicAgentConfig",
            "title": "Config"
          },
          "status": {
            "type": "string",
            "title": "Status",
            "default": "paused"
          },
          "status_code": {
            "type": "integer",
            "title": "Status Code",
            "default": 1
          },
          "kb_id": {
            "type": "integer",
            "title": "Kb Id",
            "nullable": true
          },
          "created_at": {
            "type": "string",
            "format": "date-time",
            "title": "Created At"
          },
          "updated_at": {
            "type": "string",
            "format": "date-time",
            "title": "Updated At"
          }
        },
        "type": "object",
        "required": [
          "agent_id",
          "user_id",
          "name",
          "config",
          "created_at",
          "updated_at"
        ],
        "title": "Agent"
      },
      "AgentDeployResponse": {
        "properties": {
          "agent": { "$ref": "#/components/schemas/Agent-Output" },
          "message": { "type": "string", "title": "Message" },
          "sip_status": {
            "type": "string",
            "title": "Sip Status",
            "nullable": true
          },
          "sip_details": {
            "additionalProperties": true,
            "type": "object",
            "title": "Sip Details",
            "nullable": true
          }
        },
        "type": "object",
        "required": ["agent", "message"],
        "title": "AgentDeployResponse"
      },
      "AgentDisableResponse": {
        "properties": {
          "agent": { "$ref": "#/components/schemas/Agent-Output" },
          "message": {
            "type": "string",
            "title": "Message",
            "nullable": true
          }
        },
        "type": "object",
        "required": ["agent"],
        "title": "AgentDisableResponse"
      },
      "AgentPauseResponse": {
        "properties": {
          "agent": { "$ref": "#/components/schemas/Agent-Output" }
        },
        "type": "object",
        "required": ["agent"],
        "title": "AgentPauseResponse"
      },
      "AgentPlaygroundVisibility": {
        "type": "string",
        "enum": ["public", "unlisted"],
        "title": "AgentPlaygroundVisibility"
      },
      "AgentStatsSummaryResponse": {
        "properties": {
          "total_agents": { "type": "integer", "title": "Total Agents" },
          "status_summary": {
            "$ref": "#/components/schemas/AgentStatusSummary"
          }
        },
        "type": "object",
        "required": ["total_agents", "status_summary"],
        "title": "AgentStatsSummaryResponse"
      },
      "AgentStatusResponse": {
        "properties": {
          "agent_id": { "type": "string", "title": "Agent Id" },
          "name": { "type": "string", "title": "Name" },
          "creator_user_id": { "type": "string", "title": "Creator User Id" },
          "voice_id": { "type": "string", "title": "Voice Id" },
          "status": { "type": "string", "title": "Status" },
          "status_code": { "type": "integer", "title": "Status Code" },
          "call_allowed": { "type": "boolean", "title": "Call Allowed" },
          "call_validation_details": {
            "additionalProperties": true,
            "type": "object",
            "title": "Call Validation Details",
            "nullable": true
          }
        },
        "type": "object",
        "required": [
          "agent_id",
          "name",
          "creator_user_id",
          "voice_id",
          "status",
          "status_code",
          "call_allowed"
        ],
        "title": "AgentStatusResponse"
      },
      "AgentStatusSummary": {
        "properties": {
          "deployed": { "type": "integer", "title": "Deployed", "default": 0 },
          "paused": { "type": "integer", "title": "Paused", "default": 0 },
          "disabled": { "type": "integer", "title": "Disabled", "default": 0 }
        },
        "type": "object",
        "title": "AgentStatusSummary"
      },
      "AllPhoneNumbersResponse": {
        "properties": {
          "phone_numbers": {
            "items": { "$ref": "#/components/schemas/PhoneNumberInfo" },
            "type": "array",
